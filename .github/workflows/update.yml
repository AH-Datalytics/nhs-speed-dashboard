name: Monthly NHS Speed Data Refresh

on:
  schedule:
    - cron: '0 14 7,10 * *'  # 7th and 10th of each month at 9 AM CT (2 PM UTC)
  workflow_dispatch:           # Allow manual trigger

jobs:
  redeploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel --prod --yes --token $VERCEL_TOKEN --scope ahdatalytics
